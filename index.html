  .workbench {
    display: grid;

<script data-cfasync="false" src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script data-cfasync="false" type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const ACCENT = { hex: "#E85D4A", soft: "#FCE8E3", ink: "#2A1A16" };
const BG = "#faf7f2";
const BORDER = "#ebe6df";
const TEXT_MUTED = "#6a6258";
const TEXT_FAINT = "#9a9187";

// ---------------- catalog ----------------

function useProducts() {
  const [data, setData] = useState({ tops: [], bottoms: [], shoes: [], eyewear: [] });
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    fetch('products.json')
      .then(r => r.json())
      .then(d => {
        setData({
          tops: d.tops || [],
          bottoms: d.bottoms || [],
          shoes: d.shoes || [],
          eyewear: d.eyewear || [],
        });
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);
  return { products: data, loading };
}

// ---------------- try-on backend ----------------
//
// Primary engine: FASHN AI (https://fashn.ai) — currently considered the
// state-of-the-art commercial virtual try-on model (tryon-v1.6). When the
// user has saved their FASHN API key in localStorage we call the real API.
// Without a key we fall back to a canvas-composite demo so the flow still
// renders something useful.
//
// FASHN handles a single garment per request, so for multi-item selections
// we chain calls — the previous run's output becomes the model image for
// the next garment.

const FASHN_KEY_STORAGE = 'tryonme_fashn_key';
const FASHN_DIRECT_BASE = 'https://api.fashn.ai/v1';
// Public proxy — Cloudflare Worker that holds the shared FASHN key. Leave
// empty during local dev to force demo mode without a personal key.
const PUBLIC_API_BASE = 'https://tryonme-api.kimkim.io/v1';

function getFashnKey() {
  try { return localStorage.getItem(FASHN_KEY_STORAGE) || ''; } catch { return ''; }
}
function setFashnKey(k) {
  try {
    if (k) localStorage.setItem(FASHN_KEY_STORAGE, k);
    else localStorage.removeItem(FASHN_KEY_STORAGE);
  } catch {}
}

async function runTryOn({ mode, userPhotoDataUrl, selectedItems, customPrompt, onProgress }) {
  if (mode === 'personal') {
    return runFashnTryOn({
      base: FASHN_DIRECT_BASE,
      authHeader: { 'Authorization': `Bearer ${getFashnKey()}` },
      userPhotoDataUrl, selectedItems, customPrompt, onProgress,
    });
  }
  if (mode === 'public') {
    return runFashnTryOn({
      base: PUBLIC_API_BASE,
      authHeader: {},
      userPhotoDataUrl, selectedItems, customPrompt, onProgress,
    });
  }
  return runDemoTryOn({ userPhotoDataUrl, selectedItems, customPrompt });
}

async function runFashnTryOn({ base, authHeader, userPhotoDataUrl, selectedItems, customPrompt, onProgress }) {
  // Chain garments. If a custom prompt is set, append it as a hint to the first run.
  let modelImage = userPhotoDataUrl;
  const items = selectedItems.length ? selectedItems : [{ id: 'prompt', image: null, name: customPrompt }];

  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    onProgress?.(items.length > 1 ? `입혀보는 중… (${i + 1} / ${items.length})` : '입혀보는 중…');

    // FASHN tryon-v1.6 supports tops/bottoms/one-pieces. Shoes aren't
    // first-class — we attempt 'tops' as a fallback so the user gets a
    // descriptive error rather than a silent skip.
    const fashnCategory = it.category === 'bottoms' ? 'bottoms'
                        : it.category === 'shoes'  ? 'tops'
                        : 'tops';

    const body = {
      model_name: 'tryon-v1.6',
      inputs: {
        model_image: modelImage,
        garment_image: it.image,
        category: fashnCategory,
      },
    };
    if (customPrompt && i === 0) {
      body.inputs.garment_description = customPrompt;
    }

    const runRes = await fetch(`${base}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeader },
      body: JSON.stringify(body),
    });
    if (runRes.status === 429) {
      const data = await runRes.json().catch(() => ({}));
      throw new Error(data.message || '오늘 무료 한도를 모두 사용했어요. 본인 키를 설정해서 무제한으로 쓰실 수 있어요.');
    }
    if (!runRes.ok) {
      const t = await runRes.text().catch(() => '');
      throw new Error(`AI 호출 실패 (${runRes.status}): ${t.slice(0, 200)}`);
    }
    const { id, error } = await runRes.json();
    if (error) throw new Error(typeof error === 'string' ? error : JSON.stringify(error));
    if (!id) throw new Error('응답에 작업 ID가 없습니다.');

    // Poll status. FASHN typically completes in 10-30s.
    const deadline = Date.now() + 90_000;
    let output = null;
    while (Date.now() < deadline) {
      await new Promise(r => setTimeout(r, 1800));
      const sr = await fetch(`${base}/status/${id}`, { headers: { ...authHeader } });
      if (!sr.ok) continue;
      const sd = await sr.json();
      if (sd.status === 'completed') {
        output = Array.isArray(sd.output) ? sd.output[0] : sd.output;
        break;
      }
      if (sd.status === 'failed' || sd.error) {
        throw new Error(sd.error || '처리 실패');
      }
    }
    if (!output) throw new Error('90초 안에 응답이 없었어요. 다시 시도해 주세요.');
    modelImage = output;
  }
  return modelImage;
}

async function runDemoTryOn({ userPhotoDataUrl, selectedItems, customPrompt }) {
  // Simulate latency so the UX feels real.
  await new Promise(r => setTimeout(r, 1400));

  const baseImg = await loadImage(userPhotoDataUrl);
  const canvas = document.createElement('canvas');
  const targetW = 720;
  const scale = targetW / baseImg.width;
  canvas.width = targetW;
  canvas.height = Math.round(baseImg.height * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);

  // Subtle warm overlay to suggest "processing happened"
  ctx.fillStyle = 'rgba(232,93,74,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stack selected garments as a thumbnail strip along the bottom-right corner
  const thumbSize = 96;
  const pad = 16;
  let y = canvas.height - pad - thumbSize;
  let x = canvas.width - pad - thumbSize;
  const garmentImgs = await Promise.all(
    selectedItems.slice(0, 3).map(it => loadImage(it.image).catch(() => null))
  );
  for (const img of garmentImgs) {
    if (!img) continue;
    roundedRect(ctx, x, y, thumbSize, thumbSize, 14);
    ctx.save();
    ctx.clip();
    const ratio = Math.max(thumbSize / img.width, thumbSize / img.height);
    const dw = img.width * ratio;
    const dh = img.height * ratio;
    ctx.drawImage(img, x + (thumbSize - dw) / 2, y + (thumbSize - dh) / 2, dw, dh);
    ctx.restore();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#fff';
    roundedRect(ctx, x, y, thumbSize, thumbSize, 14);
    ctx.stroke();
    x -= (thumbSize + 10);
  }

  // Watermark — make it clear this is the no-key demo path.
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  roundedRect(ctx, pad, pad, 230, 36, 999);
  ctx.fill();
  ctx.fillStyle = ACCENT.ink;
  ctx.font = '600 13px Pretendard, system-ui, sans-serif';
  ctx.fillText('TRYONME · 데모 모드 (API 키 미설정)', pad + 14, pad + 23);

  return canvas.toDataURL('image/jpeg', 0.9);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---------------- components ----------------

function Nav({ onOpenSettings, mode }) {

  const color = mode === 'personal' ? ACCENT.hex : mode === 'public' ? '#2a8a4a' : '#5a5148';
  return (
    <nav className="nav-inner" style={{ maxWidth: 1240, margin: '0 auto', padding: '22px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 10 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 30, height: 30, borderRadius: 9, background: ACCENT.hex, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700, letterSpacing: '-0.02em' }}>T</div>
        <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.02em' }}>TRYONME</span>
        <span style={{ fontSize: 11, color: TEXT_FAINT, marginLeft: 6, padding: '3px 8px', borderRadius: 999, background: '#efeae2', fontWeight: 500 }}>BETA</span>
      </div>
      <div style={{ display: 'flex', gap: 18, alignItems: 'center' }}>
        <button
          onClick={onOpenSettings}
          title="AI 엔진 설정"
          style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '4px 8px', fontSize: 13, color, display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'inherit' }}
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          {label}
        </button>
        <a href="https://github.com/geonhee15/tryonme" target="_blank" rel="noopener" style={{ fontSize: 14, color: '#5a5148', textDecoration: 'underline', textDecorationThickness: 1, textUnderlineOffset: 4 }}>GitHub</a>
        <a href="https://kimkim.io" style={{ fontSize: 14, color: '#fff', background: '#1a1a1a', padding: '8px 14px', borderRadius: 8, textDecoration: 'none', fontWeight: 500 }}>kimkim.io ↗</a>
      </div>
    </nav>
  );
}

function SettingsModal({ open, onClose, currentKey, onSave, mode, quota }) {
  const [val, setVal] = useState(currentKey || '');
  useEffect(() => { if (open) setVal(currentKey || ''); }, [open, currentKey]);
  if (!open) return null;

  const statusLine = (() => {
    if (mode === 'personal') return { label: '내 키 사용 중', detail: 'FASHN을 직접 호출 (무제한, 비용은 본인 계정에서 차감)', tone: ACCENT.hex };
    if (mode === 'public') {
      const remaining = quota ? Math.max(0, quota.limit - quota.used) : null;
      return {
        label: '무료 모드',
        detail: remaining != null ? `오늘 ${remaining} / ${quota.limit}회 남음 (UTC 자정 리셋)` : '무료 한도 안에서 자유롭게 사용 가능',
        tone: '#2a8a4a',
      };
    }
    return { label: '데모 모드', detail: 'AI 호출 비활성 — 캔버스 합성 미리보기만 제공', tone: '#9a9187' };
  })();

  return (
    <div
      onClick={onClose}
      style={{ position: 'fixed', inset: 0, background: 'rgba(20,16,12,0.55)', backdropFilter: 'blur(6px)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, animation: 'fadeUp 0.2s ease' }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{ background: '#fff', borderRadius: 20, padding: 28, maxWidth: 500, width: '100%', boxShadow: '0 40px 80px -20px rgba(0,0,0,0.40)' }}
      >
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
          <h3 style={{ margin: 0, fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em', color: ACCENT.ink }}>AI 엔진</h3>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 22, color: TEXT_FAINT, padding: 0, lineHeight: 1, fontFamily: 'inherit' }} aria-label="닫기">×</button>
        </div>

        <div style={{ marginTop: 10, padding: '12px 14px', background: '#faf7f2', borderRadius: 12, border: `1px solid ${BORDER}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, color: statusLine.tone, marginBottom: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: statusLine.tone }} />
            현재 상태: {statusLine.label}
          </div>
          <div style={{ fontSize: 12, color: TEXT_MUTED, lineHeight: 1.55 }}>{statusLine.detail}</div>
        </div>

        <p style={{ margin: '18px 0 10px', fontSize: 13, color: TEXT_MUTED, lineHeight: 1.6 }}>
          엔진은 <strong style={{ color: ACCENT.ink }}>FASHN AI · tryon-v1.6</strong> (현 시점 상용 가상 피팅 SOTA).
          무료 한도가 부족하면 본인 키를 넣어 무제한으로 쓸 수 있어요.
          키는 브라우저(localStorage)에만 저장되며 서버로 전송되지 않습니다.
        </p>
        <label style={{ fontSize: 12, color: TEXT_FAINT, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>본인 FASHN API KEY (선택)</label>
        <input
          type="password"
          value={val}
          onChange={(e) => setVal(e.target.value)}
          placeholder="fa-..."
          style={{ marginTop: 6, width: '100%', padding: '12px 14px', border: `1px solid ${BORDER}`, borderRadius: 12, fontSize: 14, fontFamily: 'inherit', outline: 'none', background: '#faf7f2' }}
          autoFocus
        />
        <div style={{ marginTop: 10, fontSize: 12, color: TEXT_FAINT, lineHeight: 1.55 }}>
          키 발급: <a href="https://app.fashn.ai/api" target="_blank" rel="noopener" style={{ color: ACCENT.hex }}>app.fashn.ai/api</a>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 20, justifyContent: 'flex-end' }}>
          {currentKey && (
            <button
              onClick={() => { onSave(''); onClose(); }}
              style={{ background: 'transparent', border: 'none', color: TEXT_MUTED, fontSize: 13, cursor: 'pointer', padding: '10px 12px', fontFamily: 'inherit' }}
            >키 삭제</button>
          )}
          <button
            onClick={onClose}
            style={{ background: '#f0ebe2', border: 'none', color: '#1a1a1a', borderRadius: 10, padding: '10px 18px', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}
          >취소</button>
          <button
            onClick={() => { onSave(val.trim()); onClose(); }}
            style={{ background: ACCENT.hex, border: 'none', color: '#fff', borderRadius: 10, padding: '10px 18px', fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}
          >저장</button>
        </div>
      </div>
    </div>
  );
}

function PhotoUpload({ photo, setPhoto, aspect = '3 / 4' }) {
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);

  const onFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = () => setPhoto(reader.result);
    reader.readAsDataURL(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    onFile(e.dataTransfer.files?.[0]);
  };

  if (photo) {
    return (
      <div style={{ position: 'relative', width: '100%', aspectRatio: aspect, borderRadius: 20, overflow: 'hidden', boxShadow: '0 20px 48px -16px rgba(0,0,0,0.20), 0 0 0 1px rgba(0,0,0,0.04)', background: '#000' }}>
        <img src={photo} alt="내 사진" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
        <button onClick={() => setPhoto(null)} style={{ position: 'absolute', top: 12, right: 12, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)', border: 'none', color: '#fff', padding: '6px 12px', borderRadius: 999, fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
          다시 올리기
        </button>
      </div>
    );
  }

  return (
    <div
      className={`upload-zone ${drag ? 'drag' : ''}`}
      onClick={() => inputRef.current?.click()}
      onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={onDrop}
      style={{
        width: '100%', aspectRatio: aspect,
        border: `2px dashed ${BORDER}`,
        borderRadius: 20,
        background: '#fff',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', padding: 24, textAlign: 'center',
      }}
    >
      <input ref={inputRef} type="file" accept="image/*" capture="user" hidden onChange={(e) => onFile(e.target.files?.[0])} />
      <div style={{ width: 48, height: 48, borderRadius: 14, background: ACCENT.soft, color: ACCENT.hex, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <circle cx="8.5" cy="9.5" r="1.5" />
          <path d="M21 16l-5-5L5 21" />
        </svg>
      </div>
      <div style={{ fontSize: 15, fontWeight: 600, color: ACCENT.ink, marginBottom: 4 }}>전신 사진을 올려주세요</div>
      <div style={{ fontSize: 12, color: TEXT_MUTED, lineHeight: 1.55, maxWidth: 280 }}>
        클릭하거나 드래그. 정면 전신 사진이 가장 잘 나와요.
      </div>
      <div style={{ marginTop: 14, display: 'flex', gap: 6, fontSize: 11, color: TEXT_FAINT }}>
        <span style={{ padding: '3px 8px', borderRadius: 999, background: '#f6f2ec' }}>JPG · PNG</span>
        <span style={{ padding: '3px 8px', borderRadius: 999, background: '#f6f2ec' }}>최대 10MB</span>
      </div>
    </div>
  );
}

function SearchBar({ value, onChange }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      background: '#fff', borderRadius: 12, padding: '4px 4px 4px 16px',
      border: `1px solid ${BORDER}`,
      boxShadow: '0 2px 8px rgba(0,0,0,0.02)',
      width: '100%', maxWidth: 460,
    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={TEXT_FAINT} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.3-4.3" />
      </svg>
      <input
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder="제품 이름·브랜드·색상으로 검색"
        style={{ flex: 1, border: 'none', outline: 'none', padding: '10px 0', fontSize: 14, fontFamily: 'inherit', background: 'transparent' }}
      />
      {value && (
        <button onClick={() => onChange('')} style={{ background: '#f0ebe2', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 12, color: '#5a5148', fontFamily: 'inherit' }}>지우기</button>
      )}
    </div>
  );
}

function CategoryTabs({ active, onChange, counts }) {
  const items = [
    { id: 'tops', label: '상의', ready: true },
    { id: 'bottoms', label: '하의', ready: true },
    { id: 'shoes', label: '신발', ready: true },
    { id: 'eyewear', label: '안경', ready: true },
  ];
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {items.map(it => {
        const isActive = it.id === active;
        const n = counts?.[it.id];
        return (
          <button
            key={it.id}
            disabled={!it.ready}
            onClick={() => it.ready && onChange?.(it.id)}
            className={`chip-tab ${isActive ? 'active' : ''}`}
            style={{
              padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 500, fontFamily: 'inherit',
              border: `1px solid ${isActive ? ACCENT.hex : BORDER}`,
              background: isActive ? ACCENT.hex : '#fff',
              color: isActive ? '#fff' : (it.ready ? '#1a1a1a' : '#bbb3a8'),
              cursor: it.ready ? 'pointer' : 'not-allowed',
            }}
          >
            {it.label}
            {it.ready && n != null && (
              <span style={{ marginLeft: 6, fontSize: 11, opacity: isActive ? 0.85 : 0.5 }}>{n}</span>
            )}
            {!it.ready && <span style={{ marginLeft: 6, fontSize: 11, color: '#c4bdb2' }}>곧</span>}
          </button>
        );
      })}
    </div>
  );
}

function ProductCard({ product, selected, onToggle }) {
  return (
    <button
      type="button"
      onClick={() => onToggle(product)}
      className={`product-card ${selected ? 'selected' : ''}`}
      style={{
        position: 'relative', textAlign: 'left', padding: 0, background: '#fff',
        border: `1px solid ${BORDER}`, borderRadius: 16, cursor: 'pointer',
        overflow: 'hidden', fontFamily: 'inherit',
      }}
    >
      <div style={{ aspectRatio: '3 / 4', background: '#f0ebe2', position: 'relative', overflow: 'hidden' }}>
        <img
          src={product.image}
          alt={product.name}
          loading="lazy"
          style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
          onError={(e) => { e.target.style.display = 'none'; }}
        />
        {selected && (
          <div style={{
            position: 'absolute', top: 10, right: 10,
            width: 28, height: 28, borderRadius: '50%',
            background: ACCENT.hex, color: '#fff',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 14, fontWeight: 700,
            boxShadow: '0 4px 12px rgba(232,93,74,0.30)',
          }}>✓</div>
        )}
      </div>
      <div style={{ padding: '12px 14px 14px' }}>
        <div style={{ fontSize: 11, color: TEXT_FAINT, fontWeight: 500, letterSpacing: '0.02em', marginBottom: 3 }}>{product.brand}</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', lineHeight: 1.35 }}>{product.name}</div>
      </div>
    </button>
  );
}

function SelectedBar({ items, onRemove, onClear }) {
  if (!items.length) {
    return (
      <div style={{ fontSize: 12, color: TEXT_FAINT, padding: '8px 4px' }}>
        오른쪽에서 옷을 선택하세요 · <span style={{ color: ACCENT.ink, fontWeight: 600 }}>0</span>벌
      </div>
    );
  }
  return (
    <div style={{
      background: '#fff', borderRadius: 14, border: `1px solid ${BORDER}`,
      padding: '10px 12px',
      boxShadow: '0 2px 8px rgba(0,0,0,0.02)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <div style={{ fontSize: 11, color: TEXT_FAINT, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>선택 {items.length}벌</div>
        <button onClick={onClear} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: TEXT_MUTED, fontSize: 11, fontFamily: 'inherit' }}>전체 해제</button>
      </div>
      <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 2 }}>
        {items.map(it => (
          <div key={it.id} style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#f6f2ec', border: `1px solid ${BORDER}`, borderRadius: 999, padding: '3px 5px 3px 3px', whiteSpace: 'nowrap', flexShrink: 0 }}>
            <img src={it.image} alt="" style={{ width: 22, height: 22, borderRadius: '50%', objectFit: 'cover' }} />
            <span style={{ fontSize: 11, color: '#1a1a1a', fontWeight: 500, maxWidth: 120, overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.name}</span>
            <button onClick={() => onRemove(it)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: TEXT_FAINT, padding: '0 4px', fontSize: 13, fontFamily: 'inherit' }} aria-label="제거">×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function CustomPromptBox({ value, onChange }) {
  return (
    <div style={{ marginTop: 36 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, letterSpacing: '-0.02em', color: ACCENT.ink }}>원하는 옷이 없나요?</h3>
        <span style={{ fontSize: 13, color: TEXT_MUTED }}>직접 설명해 주세요. AI가 만들어 입혀드려요.</span>
      </div>
      <textarea
        value={value}
        onChange={(e) => onChange(e.target.value)}
        rows={3}
        placeholder="예: 베이지 코듀로이 셔츠에 가슴 포켓 두 개, 빈티지한 느낌"
        style={{
          width: '100%', resize: 'vertical', padding: '14px 16px',
          background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 14,
          fontSize: 14, fontFamily: 'inherit', lineHeight: 1.55, color: '#1a1a1a',
          outline: 'none', boxShadow: '0 2px 8px rgba(0,0,0,0.02)',
        }}
      />
    </div>
  );
}

function Spinner({ size = 18, color = '#fff' }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      border: `2px solid ${color}55`, borderTopColor: color,
      borderRadius: '50%', animation: 'spin 0.8s linear infinite',
    }} />
  );
}

function ResultPanel({ result, loading, progressMsg, usingAI, aspect = '3 / 4' }) {
  if (loading) {
    return (
      <div style={{ borderRadius: 20, overflow: 'hidden', background: '#fff', border: `1px solid ${BORDER}`, aspectRatio: aspect, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 24, textAlign: 'center' }}>
        <Spinner size={26} color={ACCENT.hex} />
        <div style={{ fontSize: 14, fontWeight: 600, marginTop: 14, color: ACCENT.ink }}>{progressMsg || '입혀보는 중…'}</div>
        <div style={{ fontSize: 12, color: TEXT_MUTED, marginTop: 4 }}>
          {usingAI ? 'FASHN AI · 보통 10~30초' : '데모 합성 중'}
        </div>
      </div>
    );
  }
  return (
    <div style={{ borderRadius: 20, overflow: 'hidden', background: '#000', boxShadow: '0 20px 48px -16px rgba(0,0,0,0.25)' }}>
      <img src={result} alt="입어본 결과" style={{ width: '100%', display: 'block' }} />
    </div>
  );
}

// ---------------- main app ----------------

const PAGE_SIZE = 12;

function App() {
  const { products, loading: catalogLoading } = useProducts();
  const [photo, setPhoto] = useState(null);
  const [search, setSearch] = useState('');
  const [selectedIds, setSelectedIds] = useState([]);
  const [customPrompt, setCustomPrompt] = useState('');
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);
  const [progressMsg, setProgressMsg] = useState('');
  const [error, setError] = useState('');
  const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [fashnKey, setFashnKeyState] = useState(getFashnKey());
  const [quota, setQuota] = useState(null);
  const [publicProxyAlive, setPublicProxyAlive] = useState(false);

  // Probe the public proxy on mount so we can fall back to demo gracefully
  // if it isn't deployed yet.
  useEffect(() => {
    if (!PUBLIC_API_BASE) return;
    const ac = new AbortController();
    const t = setTimeout(() => ac.abort(), 3500);
    fetch(`${PUBLIC_API_BASE}/quota`, { signal: ac.signal })
      .then(r => r.ok ? r.json() : null)
      .then(q => {
        if (q && typeof q.used === 'number') {
          setPublicProxyAlive(true);
          setQuota(q);
        }
      })
      .catch(() => {})
      .finally(() => clearTimeout(t));
    return () => { clearTimeout(t); ac.abort(); };
  }, []);

  const engineMode = fashnKey ? 'personal' : (publicProxyAlive ? 'public' : 'demo');

  const [category, setCategory] = useState('tops');
  const allProducts = useMemo(
    () => [
      ...(products.tops || []),
      ...(products.bottoms || []),
      ...(products.shoes || []),
      ...(products.eyewear || []),
    ],
    [products],
  );
  const currentList = products[category] || [];
  const counts = {
    tops: (products.tops || []).length,
    bottoms: (products.bottoms || []).length,
    shoes: (products.shoes || []).length,
    eyewear: (products.eyewear || []).length,
  };
  const totalCount = counts.tops + counts.bottoms + counts.shoes + counts.eyewear;

  const selectedItems = useMemo(
    () => allProducts.filter(p => selectedIds.includes(p.id)),
    [allProducts, selectedIds]
  );

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return currentList;
    return currentList.filter(p => {
      const hay = `${p.name} ${p.brand} ${(p.tags || []).join(' ')}`.toLowerCase();
      return hay.includes(q);
    });
  }, [currentList, search]);

  // Reset paging on filter/category change.
  useEffect(() => { setVisibleCount(PAGE_SIZE); }, [search, category]);

  const visible = filtered.slice(0, visibleCount);
  const hasMore = filtered.length > visibleCount;

  const toggle = useCallback((p) => {
    setSelectedIds(prev => prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]);
  }, []);

  const tryItOn = async () => {
    if (!photo) {
      setError('먼저 전신 사진을 올려주세요.');
      document.getElementById('upload-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (!selectedItems.length && !customPrompt.trim()) {
      setError('제품을 하나 이상 고르거나, 원하는 옷을 직접 적어주세요.');
      return;
    }
    setError('');
    setRunning(true);
    setProgressMsg(engineMode === 'demo' ? '데모 합성 중…' : '입혀보는 중…');
    setResult(null);
    try {
      const out = await runTryOn({
        mode: engineMode,
        userPhotoDataUrl: photo,
        selectedItems,
        customPrompt: customPrompt.trim(),
        onProgress: setProgressMsg,
      });
      setResult(out);
      setTimeout(() => {
        document.getElementById('result-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    } catch (e) {
      console.error(e);
      setError(e?.message || '처리 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요.');
    } finally {
      setRunning(false);
      setProgressMsg('');
    }
  };

  const canRun = photo && (selectedItems.length > 0 || customPrompt.trim().length > 0) && !running;

  return (
    <div style={{ minHeight: '100vh', background: BG, color: '#1a1a1a', position: 'relative' }}>
      <Nav onOpenSettings={() => setSettingsOpen(true)} mode={engineMode} />
      <SettingsModal
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        currentKey={fashnKey}
        onSave={(k) => { setFashnKey(k); setFashnKeyState(k); }}
        mode={engineMode}
        quota={quota}
      />

      {/* BANNER strip */}
      <header className="section" style={{ maxWidth: 1320, margin: '0 auto', padding: '8px 32px 18px' }}>
        <div className="banner-inner">
          <div style={{ animation: 'fadeUp 0.5s ease both' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '5px 11px', borderRadius: 999, background: ACCENT.soft, color: ACCENT.hex, fontSize: 11, fontWeight: 500, marginBottom: 10, letterSpacing: '-0.01em' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: ACCENT.hex, animation: 'pulse-dot 2s ease-in-out infinite' }} />
              프롬프트 말고, 진짜 제품으로
            </div>
            <h1 style={{ fontSize: 30, fontWeight: 700, lineHeight: 1.15, letterSpacing: '-0.025em', margin: 0, color: '#161412' }}>
              사진 한 장 → <span style={{ color: ACCENT.hex }}>그 옷 그대로.</span>
            </h1>
            <div style={{ fontSize: 13, color: TEXT_MUTED, marginTop: 6 }}>
              실제 브랜드 {totalCount.toLocaleString()} 제품. 다중 선택 + 직접 설명 가능.
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'flex-end' }}>
            <CategoryTabs active={category} onChange={setCategory} counts={counts} />
          </div>
        </div>
      </header>

      {/* WORKBENCH 2-pane */}
      <main className="section workbench" style={{ maxWidth: 1320, margin: '0 auto', padding: '16px 32px 60px' }}>
        {/* LEFT: sticky fitting panel */}
        <aside className="workbench-side">
          <div style={{ fontSize: 11, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600, padding: '0 2px' }}>
            01 · 내 사진
          </div>
          {running ? (
            <ResultPanel loading progressMsg={progressMsg} usingAI={engineMode !== 'demo'} />
          ) : result ? (
            <div>
              <ResultPanel result={result} />
              <div style={{ display: 'flex', gap: 10, marginTop: 10, flexWrap: 'wrap' }}>
                <a href={result} download="tryonme.jpg" style={{ flex: 1, textAlign: 'center', background: '#fff', border: `1px solid ${BORDER}`, color: '#1a1a1a', padding: '9px 14px', borderRadius: 10, fontSize: 12, fontWeight: 600, textDecoration: 'none' }}>다운로드</a>
                <button
                  onClick={() => { setResult(null); setSelectedIds([]); setCustomPrompt(''); setError(''); }}
                  style={{ flex: 1, background: 'transparent', border: `1px solid ${BORDER}`, color: TEXT_MUTED, fontSize: 12, fontFamily: 'inherit', cursor: 'pointer', padding: '9px 14px', borderRadius: 10, fontWeight: 500 }}
                >다시 입혀보기</button>
              </div>
            </div>
          ) : (
            <PhotoUpload photo={photo} setPhoto={setPhoto} />
          )}

          <div style={{ fontSize: 11, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600, padding: '4px 2px 0' }}>
            02 · 선택한 옷
          </div>
          <SelectedBar
            items={selectedItems}
            onRemove={(it) => setSelectedIds(prev => prev.filter(id => id !== it.id))}
            onClear={() => setSelectedIds([])}
          />

          <button
            onClick={tryItOn}
            disabled={!canRun}
            className="cta-button"
            style={{
              background: ACCENT.hex, color: '#fff',
              border: 'none', borderRadius: 12,
              padding: '14px 22px', fontSize: 15, fontWeight: 700, letterSpacing: '-0.01em',
              fontFamily: 'inherit', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 10,
              boxShadow: '0 6px 18px -8px rgba(232,93,74,0.40)',
              justifyContent: 'center', marginTop: 4,
            }}
          >
            {running ? <><Spinner /> {progressMsg || '입혀보는 중…'}</> : <>03 · 입혀보기 →</>}
          </button>
          {error && (
            <div style={{ fontSize: 12, color: '#c54433', padding: '0 2px', lineHeight: 1.5 }}>{error}</div>
          )}

          <div style={{ fontSize: 11, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600, padding: '4px 2px 0' }}>
            04 · 직접 설명 (선택)
          </div>
          <textarea
            value={customPrompt}
            onChange={(e) => setCustomPrompt(e.target.value)}
            rows={3}
            placeholder="예: 베이지 코듀로이 셔츠, 가슴 포켓 두 개"
            style={{
              width: '100%', resize: 'vertical', padding: '12px 14px',
              background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 14,
              fontSize: 13, fontFamily: 'inherit', lineHeight: 1.5, color: '#1a1a1a',
              outline: 'none', boxShadow: '0 2px 8px rgba(0,0,0,0.02)',
              minHeight: 70,
            }}
          />
        </aside>

        {/* RIGHT: scrollable catalog */}
        <section className="workbench-main" style={{ minWidth: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, marginBottom: 14, flexWrap: 'wrap' }}>
            <div style={{ fontSize: 11, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600 }}>
              카탈로그 · {({ tops: '상의', bottoms: '하의', shoes: '신발', eyewear: '안경' })[category]} · {filtered.length.toLocaleString()}개
            </div>
            <SearchBar value={search} onChange={setSearch} />
          </div>

          {catalogLoading ? (
            <div className="catalog-grid">
              {Array.from({ length: 9 }).map((_, i) => (
                <div key={i} className="shimmer" style={{ aspectRatio: '3 / 4', borderRadius: 16 }} />
              ))}
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ background: '#fff', border: `1px dashed ${BORDER}`, borderRadius: 16, padding: 32, textAlign: 'center', color: TEXT_MUTED, fontSize: 14 }}>
              "{search}" 와 맞는 제품이 없어요. 아래에서 직접 설명해 보세요.
            </div>
          ) : (
            <>
              <div className="catalog-grid">
                {visible.map(p => (
                  <ProductCard key={p.id} product={p} selected={selectedIds.includes(p.id)} onToggle={toggle} />
                ))}
              </div>
              <div style={{ marginTop: 22, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                <div style={{ fontSize: 12, color: TEXT_FAINT, fontWeight: 500 }}>
                  {Math.min(visibleCount, filtered.length).toLocaleString()} / {filtered.length.toLocaleString()}
                </div>
                {hasMore && (
                  <button
                    onClick={() => setVisibleCount(c => c + PAGE_SIZE)}
                    style={{
                      background: '#fff', color: '#1a1a1a',
                      border: `1px solid ${BORDER}`, borderRadius: 999,
                      padding: '10px 22px', fontSize: 13, fontWeight: 600, fontFamily: 'inherit',
                      cursor: 'pointer',
                      boxShadow: '0 2px 8px rgba(0,0,0,0.03)',
                    }}
                  >
                    더보기 {Math.min(PAGE_SIZE, filtered.length - visibleCount)}개 ↓
                  </button>
                )}
              </div>
            </>
          )}

        </section>
      </main>

      <footer style={{ borderTop: `1px solid ${BORDER}`, padding: '28px 32px', maxWidth: 1240, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: TEXT_FAINT, flexWrap: 'wrap', gap: 12 }}>
        <div>© 2026 TRYONME · 베타 · <a href="https://tryonme.kimkim.io" style={{ color: TEXT_FAINT, textDecoration: 'none' }}>tryonme.kimkim.io</a></div>
        <div style={{ display: 'flex', gap: 18 }}>
          <a href="https://kimkim.io" style={{ color: TEXT_FAINT, textDecoration: 'none' }}>kimkim.io</a>
          <a href="https://github.com/geonhee15/tryonme" style={{ color: TEXT_FAINT, textDecoration: 'none' }}>GitHub</a>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
