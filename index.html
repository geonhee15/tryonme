<script data-cfasync="false" type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const ACCENT = { hex: "#E85D4A", soft: "#FCE8E3", ink: "#2A1A16" };
const BG = "#faf7f2";
const BORDER = "#ebe6df";
const TEXT_MUTED = "#6a6258";
const TEXT_FAINT = "#9a9187";

// ---------------- catalog ----------------

function useProducts() {
  const [data, setData] = useState({ tops: [] });
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    fetch('products.json')
      .then(r => r.json())
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);
  return { products: data, loading };
}

// ---------------- try-on backend ----------------
// Demo mode composites the user photo with the selected garment thumbnails on a canvas.
// Replace with a call to a virtual try-on API (e.g. fal.ai idm-vton) when ready.
async function runTryOn({ userPhotoDataUrl, selectedItems, customPrompt }) {
  // Simulate latency so the UX feels real.
  await new Promise(r => setTimeout(r, 1400));

  const baseImg = await loadImage(userPhotoDataUrl);
  const canvas = document.createElement('canvas');
  const targetW = 720;
  const scale = targetW / baseImg.width;
  canvas.width = targetW;
  canvas.height = Math.round(baseImg.height * scale);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);

  // Subtle warm overlay to suggest "processing happened"
  ctx.fillStyle = 'rgba(232,93,74,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stack selected garments as a thumbnail strip along the bottom-right corner
  const thumbSize = 96;
  const pad = 16;
  let y = canvas.height - pad - thumbSize;
  let x = canvas.width - pad - thumbSize;
  const garmentImgs = await Promise.all(
    selectedItems.slice(0, 3).map(it => loadImage(it.image).catch(() => null))
  );
  for (const img of garmentImgs) {
    if (!img) continue;
    roundedRect(ctx, x, y, thumbSize, thumbSize, 14);
    ctx.save();
    ctx.clip();
    const ratio = Math.max(thumbSize / img.width, thumbSize / img.height);
    const dw = img.width * ratio;
    const dh = img.height * ratio;
    ctx.drawImage(img, x + (thumbSize - dw) / 2, y + (thumbSize - dh) / 2, dw, dh);
    ctx.restore();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#fff';
    roundedRect(ctx, x, y, thumbSize, thumbSize, 14);
    ctx.stroke();
    x -= (thumbSize + 10);
  }

  // Watermark
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  roundedRect(ctx, pad, pad, 180, 36, 999);
  ctx.fill();
  ctx.fillStyle = ACCENT.ink;
  ctx.font = '600 13px Pretendard, system-ui, sans-serif';
  ctx.fillText('TRYONYOU · 데모 미리보기', pad + 14, pad + 23);

  return canvas.toDataURL('image/jpeg', 0.9);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function Nav() {
  return (
    <nav className="nav-inner" style={{ maxWidth: 1240, margin: '0 auto', padding: '22px 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 10 }}>

        <a href="#try" style={{ fontSize: 14, color: '#fff', background: '#1a1a1a', padding: '8px 14px', borderRadius: 8, textDecoration: 'none', fontWeight: 500 }}>입혀보기 →</a>
      </div>
    </nav>

function PhotoUpload({ photo, setPhoto }) {
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);

  const onFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = () => setPhoto(reader.result);
    reader.readAsDataURL(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    onFile(e.dataTransfer.files?.[0]);
  };

  if (photo) {
    return (
      <div style={{ position: 'relative', width: '100%', height: '100%', borderRadius: 22, overflow: 'hidden', boxShadow: '0 24px 60px -12px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04)', background: '#000', minHeight: 460 }}>
        <img src={photo} alt="내 사진" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
        <button onClick={() => setPhoto(null)} style={{ position: 'absolute', top: 14, right: 14, background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)', border: 'none', color: '#fff', padding: '8px 14px', borderRadius: 999, fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit' }}>
          다시 올리기
        </button>
      </div>
    );
  }

  return (
    <div
      className={`upload-zone ${drag ? 'drag' : ''}`}
      onClick={() => inputRef.current?.click()}
      onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={onDrop}
      style={{
        width: '100%', height: '100%', minHeight: 460,
        border: `2px dashed ${BORDER}`,
        borderRadius: 22,
        background: '#fff',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', padding: 28, textAlign: 'center',
      }}
    >
      <input ref={inputRef} type="file" accept="image/*" capture="user" hidden onChange={(e) => onFile(e.target.files?.[0])} />
      <div style={{ width: 56, height: 56, borderRadius: 16, background: ACCENT.soft, color: ACCENT.hex, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18 }}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <circle cx="8.5" cy="9.5" r="1.5" />
          <path d="M21 16l-5-5L5 21" />
        </svg>
      </div>
      <div style={{ fontSize: 17, fontWeight: 600, color: ACCENT.ink, marginBottom: 6 }}>전신 사진을 올려주세요</div>
      <div style={{ fontSize: 13, color: TEXT_MUTED, lineHeight: 1.55, maxWidth: 320 }}>
        클릭하거나 드래그해서 업로드. 정면, 전신이 잘 보이는 사진이 가장 잘 나와요.
      </div>
      <div style={{ marginTop: 22, display: 'flex', gap: 8, fontSize: 12, color: TEXT_FAINT }}>
        <span style={{ padding: '4px 10px', borderRadius: 999, background: '#f6f2ec' }}>JPG · PNG</span>
        <span style={{ padding: '4px 10px', borderRadius: 999, background: '#f6f2ec' }}>최대 10MB</span>
      </div>
    </div>
  );
}

function SearchBar({ value, onChange }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      background: '#fff', borderRadius: 12, padding: '4px 4px 4px 16px',

    }}>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={TEXT_FAINT} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">

      </svg>
      <input
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder="제품 이름·브랜드·색상으로 검색"
        style={{ flex: 1, border: 'none', outline: 'none', padding: '10px 0', fontSize: 14, fontFamily: 'inherit', background: 'transparent' }}
      />
      {value && (
        <button onClick={() => onChange('')} style={{ background: '#f0ebe2', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 12, color: '#5a5148', fontFamily: 'inherit' }}>지우기</button>
      )}
    </div>
  );
}

function CategoryTabs({ active }) {
  const items = [
    { id: 'tops', label: '상의', ready: true },
    { id: 'bottoms', label: '하의', ready: false },
    { id: 'shoes', label: '신발', ready: false },
    { id: 'eyewear', label: '안경', ready: false },
  ];
  return (
    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
      {items.map(it => {
        const isActive = it.id === active;
        return (
          <button
            key={it.id}
            disabled={!it.ready}
            className={`chip-tab ${isActive ? 'active' : ''}`}
            style={{
              padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 500, fontFamily: 'inherit',
              border: `1px solid ${isActive ? ACCENT.hex : BORDER}`,
              background: isActive ? ACCENT.hex : '#fff',
              color: isActive ? '#fff' : (it.ready ? '#1a1a1a' : '#bbb3a8'),
              cursor: it.ready ? 'pointer' : 'not-allowed',
            }}
          >
            {it.label}
            {!it.ready && <span style={{ marginLeft: 6, fontSize: 11, color: '#c4bdb2' }}>곧</span>}
          </button>
        );
      })}

  );
}

function ProductCard({ product, selected, onToggle }) {
  return (
    <button
      type="button"
      onClick={() => onToggle(product)}
      className={`product-card ${selected ? 'selected' : ''}`}
      style={{
        position: 'relative', textAlign: 'left', padding: 0, background: '#fff',
        border: `1px solid ${BORDER}`, borderRadius: 16, cursor: 'pointer',
        overflow: 'hidden', fontFamily: 'inherit',
      }}
    >
      <div style={{ aspectRatio: '3 / 4', background: '#f0ebe2', position: 'relative', overflow: 'hidden' }}>
        <img
          src={product.image}
          alt={product.name}
          loading="lazy"
          style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
          onError={(e) => { e.target.style.display = 'none'; }}
        />
        {selected && (
          <div style={{

            width: 28, height: 28, borderRadius: '50%',
            background: ACCENT.hex, color: '#fff',

      <div style={{ padding: '12px 14px 14px' }}>
        <div style={{ fontSize: 11, color: TEXT_FAINT, fontWeight: 500, letterSpacing: '0.02em', marginBottom: 3 }}>{product.brand}</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', lineHeight: 1.35 }}>{product.name}</div>
      </div>
    </button>
  );
}

function SelectedBar({ items, onRemove, onClear }) {
  if (!items.length) return null;
  return (
    <div style={{
      position: 'sticky', bottom: 16, zIndex: 5,
      background: '#fff', borderRadius: 14, border: `1px solid ${BORDER}`,
      padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12,
      boxShadow: '0 12px 32px -8px rgba(0,0,0,0.10)',
      marginTop: 22,
    }}>
      <div style={{ fontSize: 12, color: TEXT_MUTED, fontWeight: 600, whiteSpace: 'nowrap' }}>선택 {items.length}</div>
      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', flex: 1, paddingBottom: 2 }}>
        {items.map(it => (
          <div key={it.id} style={{ display: 'flex', alignItems: 'center', gap: 8, background: '#f6f2ec', border: `1px solid ${BORDER}`, borderRadius: 999, padding: '4px 6px 4px 4px', whiteSpace: 'nowrap', flexShrink: 0 }}>
            <img src={it.image} alt="" style={{ width: 26, height: 26, borderRadius: '50%', objectFit: 'cover' }} />
            <span style={{ fontSize: 12, color: '#1a1a1a', fontWeight: 500 }}>{it.name}</span>
            <button onClick={() => onRemove(it)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: TEXT_FAINT, padding: '0 6px', fontSize: 14, fontFamily: 'inherit' }} aria-label="제거">×</button>
          </div>
        ))}
      </div>
      <button onClick={onClear} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: TEXT_MUTED, fontSize: 12, fontFamily: 'inherit', whiteSpace: 'nowrap' }}>전체 해제</button>
    </div>
  );
}

function CustomPromptBox({ value, onChange }) {
  return (
    <div style={{ marginTop: 36 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 17, fontWeight: 700, letterSpacing: '-0.02em', color: ACCENT.ink }}>원하는 옷이 없나요?</h3>
        <span style={{ fontSize: 13, color: TEXT_MUTED }}>직접 설명해 주세요. AI가 만들어 입혀드려요.</span>
      </div>
      <textarea
        value={value}
        onChange={(e) => onChange(e.target.value)}
        rows={3}
        placeholder="예: 베이지 코듀로이 셔츠에 가슴 포켓 두 개, 빈티지한 느낌"
        style={{
          width: '100%', resize: 'vertical', padding: '14px 16px',
          background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 14,
          fontSize: 14, fontFamily: 'inherit', lineHeight: 1.55, color: '#1a1a1a',

      />

}

function Spinner({ size = 18, color = '#fff' }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size,
      border: `2px solid ${color}55`, borderTopColor: color,
      borderRadius: '50%', animation: 'spin 0.8s linear infinite',
    }} />
  );
}

function ResultPanel({ result, loading, error, photoPresent }) {
  if (loading) {
    return (
      <div style={{ borderRadius: 22, overflow: 'hidden', background: '#fff', border: `1px solid ${BORDER}`, minHeight: 460, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 28, textAlign: 'center' }}>
        <Spinner size={28} color={ACCENT.hex} />
        <div style={{ fontSize: 15, fontWeight: 600, marginTop: 18, color: ACCENT.ink }}>입혀보는 중…</div>
        <div style={{ fontSize: 13, color: TEXT_MUTED, marginTop: 6 }}>잠깐만요, 보통 10~20초 걸려요.</div>
      </div>
    );
  }
  if (error) {
    return (
      <div style={{ borderRadius: 22, background: '#fff', border: `1px solid ${BORDER}`, minHeight: 200, padding: 24 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: '#c54433', marginBottom: 6 }}>다시 시도해 주세요</div>
        <div style={{ fontSize: 13, color: TEXT_MUTED }}>{error}</div>
      </div>
    );
  }
  if (!result) {
    if (!photoPresent) return null;
    return (
      <div style={{ borderRadius: 22, background: '#fff', border: `1px dashed ${BORDER}`, padding: 24, textAlign: 'center', color: TEXT_MUTED, fontSize: 13 }}>
        제품을 고르고 <strong style={{ color: ACCENT.ink }}>입혀보기</strong> 버튼을 눌러주세요.
      </div>
    );
  }
  return (
    <div style={{ borderRadius: 22, overflow: 'hidden', background: '#000', boxShadow: '0 24px 60px -12px rgba(0,0,0,0.25)' }}>
      <img src={result} alt="입어본 결과" style={{ width: '100%', display: 'block' }} />
    </div>
  );
}

// ---------------- main app ----------------

function App() {
  const { products, loading: catalogLoading } = useProducts();
  const [photo, setPhoto] = useState(null);
  const [search, setSearch] = useState('');
  const [selectedIds, setSelectedIds] = useState([]);
  const [customPrompt, setCustomPrompt] = useState('');
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);
  const [error, setError] = useState('');

  const tops = products.tops || [];
  const selectedItems = useMemo(
    () => tops.filter(p => selectedIds.includes(p.id)),
    [tops, selectedIds]
  );

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return tops;
    return tops.filter(p => {
      const hay = `${p.name} ${p.brand} ${(p.tags || []).join(' ')}`.toLowerCase();
      return hay.includes(q);
    });
  }, [tops, search]);

  const toggle = useCallback((p) => {
    setSelectedIds(prev => prev.includes(p.id) ? prev.filter(id => id !== p.id) : [...prev, p.id]);
  }, []);

  const tryItOn = async () => {
    if (!photo) {
      setError('먼저 전신 사진을 올려주세요.');
      document.getElementById('upload-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (!selectedItems.length && !customPrompt.trim()) {
      setError('제품을 하나 이상 고르거나, 원하는 옷을 직접 적어주세요.');
      return;
    }
    setError('');
    setRunning(true);
    setResult(null);
    try {
      const out = await runTryOn({
        userPhotoDataUrl: photo,
        selectedItems,
        customPrompt: customPrompt.trim(),
      });
      setResult(out);
      setTimeout(() => {
        document.getElementById('result-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    } catch (e) {
      console.error(e);
      setError('처리 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요.');
    } finally {
      setRunning(false);
    }
  };

  const canRun = photo && (selectedItems.length > 0 || customPrompt.trim().length > 0) && !running;

  return (
    <div style={{ minHeight: '100vh', background: BG, color: '#1a1a1a', position: 'relative', overflow: 'hidden' }}>
      <Nav />

      {/* HERO */}
      <section className="section" style={{ maxWidth: 1240, margin: '0 auto', padding: '40px 32px 28px' }} id="try">
        <div className="hero-grid" style={{ display: 'grid', gridTemplateColumns: '1.05fr 0.95fr', gap: 56, alignItems: 'center', minHeight: 540 }}>
          <div style={{ animation: 'fadeUp 0.7s ease both' }}>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '6px 12px', borderRadius: 999, background: ACCENT.soft, color: ACCENT.hex, fontSize: 12, fontWeight: 500, marginBottom: 26, letterSpacing: '-0.01em' }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: ACCENT.hex, animation: 'pulse-dot 2s ease-in-out infinite' }} />
              프롬프트 말고, 진짜 제품으로
            </div>
            <h1 className="headline" style={{ fontSize: 62, fontWeight: 700, lineHeight: 1.05, letterSpacing: '-0.035em', margin: 0, color: '#161412' }}>
              사진 한 장 올리면,<br />
              <span style={{ color: ACCENT.hex }}>그 옷 그대로 입혀드려요.</span>
            </h1>
            <p style={{ fontSize: 17, color: '#5a5148', lineHeight: 1.6, margin: '22px 0 28px', maxWidth: 500, textWrap: 'pretty' }}>
              "검은 셔츠 입혀줘" 같은 프롬프트 말고. 진짜 브랜드의 진짜 제품을 골라서 그대로 입어볼 수 있어요. 여러 개 동시에 골라도 돼요.
            </p>
            <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
              <a href="#catalog" style={{ background: '#1a1a1a', color: '#fff', padding: '12px 18px', borderRadius: 10, fontSize: 14, fontWeight: 600, textDecoration: 'none', letterSpacing: '-0.01em' }}>옷 둘러보기 ↓</a>
              <a href="#prompt" style={{ background: 'transparent', color: '#5a5148', padding: '12px 4px', fontSize: 14, fontWeight: 500, textDecoration: 'underline', textUnderlineOffset: 4 }}>또는 직접 설명하기</a>
            </div>
          </div>
          <div className="hero-right" id="upload-anchor" style={{ minHeight: 540, animation: 'fadeUp 0.9s ease both' }}>
            <PhotoUpload photo={photo} setPhoto={setPhoto} />
          </div>
        </div>
      </section>

      {/* CATALOG */}
      <section className="section" id="catalog" style={{ borderTop: `1px solid ${BORDER}`, background: '#f6f2ec', padding: '40px 32px' }}>
        <div style={{ maxWidth: 1240, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 18, marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 12, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600, marginBottom: 8 }}>CATALOG · 상의</div>
              <h2 style={{ margin: 0, fontSize: 28, fontWeight: 700, letterSpacing: '-0.025em', color: ACCENT.ink }}>스크롤하며 골라보세요</h2>
              <div style={{ fontSize: 13, color: TEXT_MUTED, marginTop: 6 }}>여러 벌 동시에 입혀볼 수 있어요.</div>
            </div>
            <SearchBar value={search} onChange={setSearch} />
          </div>

          <div style={{ marginBottom: 18 }}>
            <CategoryTabs active="tops" />
          </div>

          {catalogLoading ? (
            <div className="catalog-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14 }}>
              {Array.from({ length: 8 }).map((_, i) => (
                <div key={i} className="shimmer" style={{ aspectRatio: '3 / 4', borderRadius: 16 }} />
              ))}
            </div>
          ) : filtered.length === 0 ? (
            <div style={{ background: '#fff', border: `1px dashed ${BORDER}`, borderRadius: 16, padding: 32, textAlign: 'center', color: TEXT_MUTED, fontSize: 14 }}>
              "{search}" 와 맞는 제품이 없어요. 아래에서 직접 설명해 보세요.
            </div>
          ) : (
            <div className="catalog-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14 }}>
              {filtered.map(p => (
                <ProductCard key={p.id} product={p} selected={selectedIds.includes(p.id)} onToggle={toggle} />
              ))}
            </div>
          )}

          <SelectedBar
            items={selectedItems}
            onRemove={(it) => setSelectedIds(prev => prev.filter(id => id !== it.id))}
            onClear={() => setSelectedIds([])}
          />

          <div id="prompt">
            <CustomPromptBox value={customPrompt} onChange={setCustomPrompt} />
          </div>

          <div style={{ marginTop: 28, display: 'flex', justifyContent: 'center' }}>
            <button
              onClick={tryItOn}
              disabled={!canRun}
              className="cta-button"
              style={{
                background: ACCENT.hex, color: '#fff',
                border: 'none', borderRadius: 12,
                padding: '16px 32px', fontSize: 16, fontWeight: 700, letterSpacing: '-0.01em',
                fontFamily: 'inherit', cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 10,
                boxShadow: '0 8px 22px -10px rgba(232,93,74,0.40)',
                minWidth: 200, justifyContent: 'center',
              }}
            >
              {running ? <><Spinner /> 입혀보는 중…</> : <>입혀보기 →</>}
            </button>
          </div>
          {error && (
            <div style={{ marginTop: 14, fontSize: 13, color: '#c54433', textAlign: 'center' }}>{error}</div>
          )}
        </div>
      </section>

      {/* RESULT */}
      <section className="section" id="result-anchor" style={{ maxWidth: 1240, margin: '0 auto', padding: '40px 32px' }}>
        {(result || running || error) && (
          <>
            <div style={{ fontSize: 12, color: TEXT_FAINT, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 600, marginBottom: 8 }}>RESULT</div>
            <h2 style={{ margin: '0 0 20px', fontSize: 24, fontWeight: 700, letterSpacing: '-0.025em', color: ACCENT.ink }}>입혀본 모습</h2>
            <div style={{ maxWidth: 720, margin: '0 auto' }}>
              <ResultPanel result={result} loading={running} error={error} photoPresent={!!photo} />
              {result && (
                <div style={{ display: 'flex', justifyContent: 'center', gap: 10, marginTop: 16, flexWrap: 'wrap' }}>
                  <a href={result} download="tryonyou.jpg" style={{ background: '#fff', border: `1px solid ${BORDER}`, color: '#1a1a1a', padding: '10px 18px', borderRadius: 10, fontSize: 13, fontWeight: 600, textDecoration: 'none' }}>다운로드</a>
                  <button onClick={() => { setResult(null); setSelectedIds([]); setCustomPrompt(''); window.scrollTo({ top: 0, behavior: 'smooth' }); }} style={{ background: 'transparent', border: 'none', color: TEXT_MUTED, fontSize: 13, fontFamily: 'inherit', cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: 3 }}>다른 옷 입혀보기</button>
                </div>
              )}
            </div>
          </>
        )}
      </section>

      <footer style={{ borderTop: `1px solid ${BORDER}`, padding: '28px 32px', maxWidth: 1240, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12, color: TEXT_FAINT, flexWrap: 'wrap', gap: 12 }}>
        <div>© 2026 TRYONYOU · 베타</div>
        <div style={{ display: 'flex', gap: 18 }}>
          <a href="https://kimkim.io" style={{ color: TEXT_FAINT, textDecoration: 'none' }}>kimkim.io</a>
          <a href="https://github.com/geonhee15/tryonyou" style={{ color: TEXT_FAINT, textDecoration: 'none' }}>GitHub</a>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
